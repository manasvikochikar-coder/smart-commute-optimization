<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Smart Communication</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 400px;
        }

        h1 { font-size: 24px; color: #333; margin-bottom: 20px; }

        label { display: block; margin-top: 15px; font-size: 14px; color: #666; }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .next-btn {
            display: block;
            width: 100%;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .next-btn:hover { background: #333; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Where to?</h1>
        <form action="secondpage.html">
            <label>Starting Point</label>
            <input type="text" placeholder="City or Station" required>

            <label>Destination</label>
            <input type="text" placeholder="Where are you going?" required>

            <button type="submit" class="next-btn">Find Routes</button>
        </form>
    </div>

</body>
</html>
