<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Communication | Join Us</title>
   <style>
    body {
    /* Deep Navy Radial Gradient for a spotlight effect */
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.glass-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    
    /* The Gold Border - This is what makes it look Royal */
    border: 1px solid #d4af37; 
    
    border-radius: 24px;
    padding: 40px;
    width: 380px;
    /* Soft shadow with a hint of navy */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    color: white;
}

.btn {
    background: #d4af37; /* Gold Button */
    color: #0f172a;    /* Navy Text for contrast */
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
}
</style>
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>Smart Communication</h2>
        <form action="index.html"> <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn">Get Started</button>
        </form>
    </div>

</body>
</html>
