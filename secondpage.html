<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Routes | Ultimate Optimizer</title>
  <style>
    :root {
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-color: #1a1a1a;
      --accent: #2575fc;
      --accent-gradient: linear-gradient(135deg, #2575fc, #6a11cb);
      --border-color: #e5e7eb;
    }
    body.dark {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #f5f5f5;
      --accent: #4dabf7;
      --accent-gradient: linear-gradient(135deg, #4dabf7, #9775fa);
      --border-color: #333;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-color);
      padding: 20px;
      color: var(--text-color);
      transition: background 0.3s;
    }
    .card {
      background: var(--card-bg);
      max-width: 800px;
      margin: 0 auto;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.1);
    }
    .toggle-btn {
      float: right; background: var(--accent); color: white;
      border: none; padding: 6px 12px; border-radius: 8px;
      cursor: pointer; font-size: 12px;
    }
    .live-badge {
      display: inline-block; padding: 6px 14px;
      background: #e1ffed; color: #10b981;
      border-radius: 20px; font-size: 12px; font-weight: bold;
      margin-bottom: 20px;
    }
    select {
      width: 100%; padding: 14px; margin-bottom: 20px;
      border-radius: 12px; border: 2px solid var(--border-color);
      background: var(--card-bg); color: var(--text-color);
      font-weight: 500;
    }
    .transport-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;
    }
    .mode-item {
      padding: 20px; border: 2px solid var(--border-color);
      border-radius: 16px; cursor: pointer; transition: 0.3s;
      text-align: center; font-weight: 600;
    }
    .mode-item:hover { border-color: var(--accent); }
    .mode-item.selected {
      border-color: var(--accent); background: rgba(37, 117, 252, 0.1);
      color: var(--accent); transform: scale(1.05);
    }
    .finish-btn {
      width: 100%; margin-top: 30px; padding: 18px;
      background: var(--accent-gradient); color: white;
      border: none; border-radius: 15px; font-weight: bold;
      cursor: pointer; font-size: 16px;
    }
    #results-area {
      margin-top: 25px; padding: 20px; border-radius: 15px;
      background: rgba(0,0,0,0.03); display: none;
    }
    body.dark #results-area { background: rgba(255,255,255,0.05); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: left; font-size: 13px; }
    th { background: var(--accent); color: white; border-radius: 4px; }
    .eco-text { color: #10b981; font-weight: bold; }
  </style>
</head>
<body>

  <div class="card">
    <button class="toggle-btn" onclick="toggleDarkMode()">🌓 UI Theme</button>
    <div class="live-badge">● LIVE TRAFFIC DATA</div>
    <h2 style="margin-top: 0;">Journey Optimizer</h2>
    
    <label style="display:block; font-weight:600; margin-bottom:5px;">Priority Optimization</label>
    <select id="priority">
      <option value="short">Shortest Time (ETA)</option>
      <option value="cheap">Cheapest Rate (Price)</option>
      <option value="eco">Eco-Friendly (Low CO2)</option>
      <option value="comfort">Maximum Comfort (Rating)</option>
    </select>

    <div class="transport-grid">
      <div class="mode-item" onclick="selectMode(this, 'bus')">🚌 Bus</div>
      <div class="mode-item" onclick="selectMode(this, 'train')">🚆 Train</div>
      <div class="mode-item" onclick="selectMode(this, 'cab')">🚕 Cab</div>
      <div class="mode-item" onclick="selectMode(this, 'plane')">✈️ Plane</div>
    </div>

    <button class="finish-btn" onclick="calculateRoute()">Calculate Optimal Routes</button>

    <div id="results-area">
      <div id="data-output"></div>
    </div>
  </div>

  <script>
    const db = {
      bus: Array.from({length: 10}, (_, i) => ({
        name: `Bus ${100 + i}`, info: "City Transit Line", eta: [5, 12, 8, 20, 15, 30, 4, 18, 25, 10][i], 
        cost: [15, 20, 10, 25, 18, 30, 12, 22, 28, 14][i], eco: [2, 3, 2, 4, 3, 5, 2, 4, 5, 3][i], rating: [4, 3, 4, 5, 3, 4, 4, 5, 3, 4][i]
      })),
      train: Array.from({length: 10}, (_, i) => ({
        name: `Train T-${i+1}`, info: `Platform ${Math.floor(Math.random()*10)+1}`, eta: [2, 15, 8, 5, 20, 12, 30, 18, 10, 6][i], 
        cost: [10, 50, 20, 15, 60, 25, 80, 40, 30, 18][i], eco: [1, 2, 1, 1, 3, 1, 3, 2, 1, 1][i], rating: [3, 5, 4, 3, 5, 4, 5, 4, 4, 3][i]
      })),
      cab: Array.from({length: 10}, (_, i) => ({
        name: ["Uber Go", "Ola Mini", "Uber XL", "Ola Prime", "Lyft", "Bolt", "Uber Black", "Taxi Co", "Zify", "InDrive"][i], info: "Nearby", eta: [3, 6, 2, 8, 5, 7, 4, 10, 12, 9][i], 
        cost: [120, 110, 250, 180, 130, 115, 400, 150, 100, 95][i], eco: [6, 6, 8, 7, 6, 6, 9, 7, 5, 6][i], rating: [4, 3, 5, 4, 4, 3, 5, 3, 4, 2][i]
      })),
      plane: Array.from({length: 10}, (_, i) => ({
        name: ["IndiGo", "Air India", "SpiceJet", "Vistara", "Akasa", "AirAsia", "Emirates", "Qatar", "Lufthansa", "Etihad"][i], info: "T2 Gate", eta: [120, 150, 180, 110, 130, 200, 140, 160, 170, 190][i], 
        cost: [4500, 6000, 4200, 7500, 3800, 4100, 15000, 18000, 14000, 16000][i], eco: [20, 25, 22, 24, 19, 21, 35, 38, 32, 36][i], rating: [3, 4, 3, 5, 4, 3, 5, 5, 5, 5][i]
      }))
    };

    let activeMode = "";

    function toggleDarkMode() { document.body.classList.toggle('dark'); }

    function selectMode(el, mode) {
      document.querySelectorAll('.mode-item').forEach(m => m.classList.remove('selected'));
      el.classList.add('selected');
      activeMode = mode;
    }

    function calculateRoute() {
      if(!activeMode) return alert("Please select a transport mode!");
      const priority = document.getElementById('priority').value;
      const res = document.getElementById('results-area');
      const out = document.getElementById('data-output');
      res.style.display = "block";

      let data = [...db[activeMode]];

      // Sorting Logic
      if (priority === 'short') data.sort((a, b) => a.eta - b.eta);
      else if (priority === 'cheap') data.sort((a, b) => a.cost - b.cost);
      else if (priority === 'eco') data.sort((a, b) => a.eco - b.eco);
      else if (priority === 'comfort') data.sort((a, b) => b.rating - a.rating);

      let html = `<h3>Top Results for ${activeMode.toUpperCase()}</h3><table>
        <tr><th>Service</th><th>Info</th><th>ETA</th><th>Price</th><th>CO2</th></tr>`;
      
      data.forEach(item => {
        html += `<tr>
          <td><b>${item.name}</b><br><small>${'⭐'.repeat(item.rating)}</small></td>
          <td>${item.info}</td>
          <td>${item.eta}m</td>
          <td>₹${item.cost}</td>
          <td class="eco-text">${item.eco}kg</td>
        </tr>`;
      });
      out.innerHTML = html + `</table>`;
    }
  </script>
</body>
</html>
